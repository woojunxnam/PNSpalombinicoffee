  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #f7f3ee;
      --bg2:       #ede8e0;
      --card:      #ffffff;
      --text:      #2b1d14;
      --muted:     #7a6555;
      --accent:    #c8aa6e;
      --accent-dk: #a07840;
      --line:      rgba(192,160,100,.18);
      --shadow:    0 2px 12px rgba(43,29,20,.07);
      --serif:     'Noto Serif KR', Georgia, serif;
      --sans:      'Noto Sans KR', 'Noto Sans SC', 'Noto Sans JP', -apple-system, sans-serif;
    }

    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ── HEADER ─────────────────────────────── */
    .menu-header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(247,243,238,.97);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--line);
    }
    .menu-header-inner {
      max-width: 720px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      padding: 10px 16px;
      gap: 10px;
      min-height: 54px;
    }

    /* Brand — takes leftover space, never wraps */
    .menu-brand {
      flex: 1;
      min-width: 0;            /* key: allows text-overflow to work */
      overflow: hidden;
      display: flex;
      flex-direction: column;
      gap: 1px;
    }
    .menu-brand-eyebrow {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: .13em;
      text-transform: uppercase;
      color: var(--accent-dk);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .menu-brand-name {
      font-family: var(--serif);
      font-size: 17px;
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      line-height: 1.2;
    }

    /* Controls — never shrinks */
    .menu-header-controls {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }
    .menu-title-badge {
      font-size: 10px;
      font-weight: 800;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--accent);
      background: rgba(200,170,110,.12);
      border: 1px solid rgba(200,170,110,.28);
      border-radius: 6px;
      padding: 3px 8px;
      white-space: nowrap;
    }

    /* ── LANG BAR ────────────────────────────── */
    .lang-bar {
      background: rgba(247,243,238,.97);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--line);
      padding: 7px 14px;
    }
    .lang-bar-inner {
      max-width: 720px;
      margin: 0 auto;
      display: flex;
      justify-content: center;
    }

    /* ── LANG SWITCHER ───────────────────────── */
    .lang-switcher {
      display: flex;
      gap: 2px;
      background: var(--bg2);
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 3px;
    }
    .lang-btn {
      padding: 4px 9px;
      border-radius: 999px;
      border: none;
      background: transparent;
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      cursor: pointer;
      transition: background .15s, color .15s, opacity .15s;
      font-family: var(--sans);
      white-space: nowrap;
    }
    .lang-btn.active {
      background: var(--card);
      color: var(--text);
      box-shadow: 0 1px 4px rgba(43,29,20,.10);
    }
    .lang-btn .flag { font-size: 12px; line-height: 1; }
    .lang-btn.unavailable {
      opacity: .4;
      cursor: not-allowed;
    }

    /* ── CATEGORY NAV ───────────────────────── */
    .cat-nav {
      position: sticky;
      /* top set dynamically by JS */
      z-index: 90;
      background: rgba(247,243,238,.97);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--line);
      overflow-x: auto;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
    }
    .cat-nav::-webkit-scrollbar { display: none; }
    .cat-nav-inner {
      display: flex;
      gap: 5px;
      padding: 7px 14px;
      white-space: nowrap;
      max-width: 720px;
      margin: 0 auto;
    }
    .cat-nav-btn {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 5px 12px;
      border-radius: 999px;
      border: 1px solid transparent;
      background: transparent;
      font-size: 12px;
      font-weight: 500;
      color: var(--muted);
      cursor: pointer;
      transition: all .15s;
      font-family: var(--sans);
      white-space: nowrap;
      flex-shrink: 0;
    }
    .cat-nav-btn:hover:not(.active) {
      background: var(--bg2);
      color: var(--text);
    }
    .cat-nav-btn.active {
      background: var(--text);
      border-color: var(--text);
      color: #fff;
      font-weight: 600;
    }

    /* ── MENU BODY ──────────────────────────── */
    .menu-body {
      max-width: 720px;
      margin: 0 auto;
      padding: 18px 14px 80px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    /* ── CATEGORY SECTION ───────────────────── */
    .cat-section {
      background: var(--card);
      border-radius: 16px;
      border: 1px solid var(--line);
      overflow: hidden;
      box-shadow: var(--shadow);
      /* scroll-margin-top set dynamically */
    }
    .cat-head {
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 14px 18px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(135deg, rgba(200,170,110,.07), transparent 60%);
    }
    .cat-icon { font-size: 18px; line-height: 1; flex-shrink: 0; }
    .cat-name {
      font-family: var(--serif);
      font-size: 16px;
      font-weight: 600;
      color: var(--text);
    }
    .cat-badge {
      font-size: 9px;
      font-weight: 600;
      color: var(--accent-dk);
      background: rgba(200,170,110,.10);
      border: 1px solid rgba(200,170,110,.22);
      border-radius: 6px;
      padding: 2px 7px;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .cat-count {
      margin-left: auto;
      font-size: 10px;
      font-weight: 600;
      color: var(--muted);
      background: var(--bg);
      padding: 2px 7px;
      border-radius: 999px;
      border: 1px solid var(--line);
      flex-shrink: 0;
    }

    /* ── ITEM GRID ──────────────────────────── */
    .item-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
    }
    .item-grid.col-1 { grid-template-columns: 1fr; }

    .menu-item {
      padding: 10px 18px;
      font-size: 13.5px;
      color: var(--text);
      border-bottom: 1px solid rgba(192,160,100,.07);
      display: flex;
      align-items: center;
      gap: 6px;
      line-height: 1.4;
    }
    .menu-item::before {
      content: '';
      width: 3.5px;
      height: 3.5px;
      border-radius: 50%;
      background: var(--accent);
      opacity: .55;
      flex-shrink: 0;
    }
    .menu-item.group-label {
      font-size: 10.5px;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--accent-dk);
      background: rgba(200,170,110,.06);
      padding-top: 11px;
      border-top: 1px solid var(--line);
      grid-column: 1 / -1;
    }
    .menu-item.group-label::before { display: none; }

    /* ── GELATO NOTE ────────────────────────── */
    .cat-note {
      padding: 11px 18px 14px;
      background: var(--bg);
      border-top: 1px solid var(--line);
    }
    .cat-note-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .10em;
      text-transform: uppercase;
      color: var(--accent-dk);
      margin-bottom: 7px;
    }
    .flavor-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
    }
    .flavor-chip {
      padding: 3px 9px;
      border-radius: 999px;
      background: var(--card);
      border: 1px solid var(--line);
      font-size: 11.5px;
      color: var(--text);
    }

    /* ── FOOTER ─────────────────────────────── */
    .menu-footer {
      max-width: 720px;
      margin: 0 auto;
      padding: 8px 14px 48px;
    }
    .menu-footer-inner {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 16px 18px;
      text-align: center;
    }
    .footer-brand {
      font-family: var(--serif);
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 4px;
    }
    .footer-note { font-size: 11px; color: var(--muted); line-height: 1.7; }

    /* ── TOAST ──────────────────────────────── */
    .toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(60px);
      background: rgba(43,29,20,.92);
      color: #fff;
      font-size: 13px;
      font-weight: 500;
      padding: 10px 20px;
      border-radius: 999px;
      opacity: 0;
      transition: transform .22s, opacity .22s;
      pointer-events: none;
      z-index: 999;
      white-space: nowrap;
      backdrop-filter: blur(8px);
    }
    .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

    /* ── TEMP BADGES ───────────────────────── */
    .temp-tags { margin-left: auto; display: flex; gap: 2px; flex-shrink: 0; }
    .temp-tag {
      font-size: 8.5px;
      font-weight: 800;
      letter-spacing: .03em;
      border-radius: 3px;
      padding: 1px 4px;
      line-height: 1.4;
    }
    .temp-tag.hot  { color: #b8452a; background: rgba(184,69,42,.10); }
    .temp-tag.ice  { color: #2a7ab8; background: rgba(42,122,184,.10); }

    /* ── KOREAN SUB-NAME ───────────────────── */
    .ko-sub {
      font-size: 11px;
      color: var(--muted);
      font-weight: 400;
    }

    /* ── RESPONSIVE ─────────────────────────── */
    @media (max-width: 400px) {
      .lang-btn { padding: 4px 7px; font-size: 10.5px; }
      .menu-brand-eyebrow { display: none; }
    }
  </style>
</head>

  /* ══════════════════════════════════════════════════════
     TEMPERATURE MAP  —  hot / ice / both per item
     String = all items in category share that temp.
     Array  = per-item temp (same index as items array).
  ══════════════════════════════════════════════════════ */
  const TEMP_MAP = {
    coffee: ['hot','hot','hot','both','both','both','both','both','both',
             'both','both','both','both','both','ice','both','ice','ice','both'],
    latte:  ['both','both','both','both','both','both','both','ice','ice','ice','ice','ice'],
    ade:      'ice',
    smoothie: 'ice',
    fruittea: 'both',
    icedtea:  'ice',
    blacktea: 'both',
    herbtea:  'both'
  };

  function getTempHTML(catId, idx) {
    const rule = TEMP_MAP[catId];
    if (!rule) return '';
    const t = typeof rule === 'string' ? rule : (rule[idx] || 'both');
    if (t === 'hot')  return '<span class="temp-tags"><span class="temp-tag hot">HOT</span></span>';
    if (t === 'ice')  return '<span class="temp-tags"><span class="temp-tag ice">ICE</span></span>';
    return '<span class="temp-tags"><span class="temp-tag hot">H</span><span class="temp-tag ice">I</span></span>';
  }

  /* ══════════════════════════════════════════════════════
     RENDER
  ══════════════════════════════════════════════════════ */
  let currentLang = 'ko';
  let sectionObserver = null;

  function renderMenu(lang) {
    const data = MENU[lang];
    if (!data) return;
    currentLang = lang;
    const cats = data.categories;

    /* Update header brand */
    document.getElementById('headerBrandName').textContent = data.brandName;
    document.documentElement.lang = { ko:'ko', en:'en', zh:'zh-Hans', ja:'ja', vi:'vi' }[lang] || 'ko';

    /* Update footer */
    document.getElementById('footerBrand').textContent = data.footerBrand;
    document.getElementById('footerNote').innerHTML =
      data.footerNote.replace(/\n/g, '<br>');

    /* Category nav */
    const navEl = document.getElementById('catNavInner');
    navEl.innerHTML = cats.map(cat =>
      `<button class="cat-nav-btn" data-cat="${cat.id}"
        onclick="jumpTo('${cat.id}',this)">${cat.icon} ${cat.name}</button>`
    ).join('');
    navEl.querySelector('.cat-nav-btn')?.classList.add('active');

    /* Korean name lookup for non-KO languages */
    const koData = MENU.ko.categories;
    function koName(catId, flatIdx) {
      if (lang === 'ko') return '';
      const koCat = koData.find(c => c.id === catId);
      if (!koCat) return '';
      let name;
      if (koCat.groups) {
        let offset = 0;
        for (const g of koCat.groups) {
          if (flatIdx < offset + g.items.length) { name = g.items[flatIdx - offset]; break; }
          offset += g.items.length;
        }
      } else {
        name = koCat.items?.[flatIdx];
      }
      return name ? ` <span class="ko-sub">(${name})</span>` : '';
    }

    /* Menu sections */
    document.getElementById('menuBody').innerHTML = cats.map(cat => {
      let contentHTML = '';
      if (cat.groups) {
        let flatIdx = 0;
        cat.groups.forEach((g, i) => {
          const gridCls = g.items.length <= 5 ? 'col-1' : '';
          contentHTML += `<div class="item-grid ${gridCls}">
            <div class="menu-item group-label">${g.label}</div>
            ${g.items.map(it => {
              const html = `<div class="menu-item">${it}${koName(cat.id, flatIdx)}${getTempHTML(cat.id, flatIdx)}</div>`;
              flatIdx++;
              return html;
            }).join('')}
          </div>`;
        });
      } else {
        const n = cat.items.length;
        const gridCls = n <= 5 ? 'col-1' : '';
        contentHTML = `<div class="item-grid ${gridCls}">
          ${cat.items.map((it, idx) => `<div class="menu-item">${it}${koName(cat.id, idx)}${getTempHTML(cat.id, idx)}</div>`).join('')}
        </div>`;
      }

      const noteHTML = cat.note ? `
        <div class="cat-note">
          <div class="cat-note-label">${cat.note.label}</div>
          <div class="flavor-chips">
            ${cat.note.chips.map(c => `<span class="flavor-chip">${c}</span>`).join('')}
          </div>
        </div>` : '';

      const total = cat.groups
        ? cat.groups.reduce((s, g) => s + g.items.length, 0)
        : cat.items.length;

      return `
        <section class="cat-section" id="cat-${cat.id}">
          <div class="cat-head">
            <span class="cat-icon">${cat.icon}</span>
            <span class="cat-name">${cat.name}</span>
            ${cat.badge ? `<span class="cat-badge">${cat.badge}</span>` : ''}
            <span class="cat-count">${total}</span>
          </div>
          ${contentHTML}${noteHTML}
        </section>`;
    }).join('');

    updateLayout();
    observeSections();
  }

  /* ══════════════════════════════════════════════════════
     STICKY NAV — measure header height dynamically
  ══════════════════════════════════════════════════════ */
  const headerEl = document.getElementById('menuHeader');
  const catNavEl = document.getElementById('catNav');

  function updateLayout() {
    const hh = headerEl.offsetHeight;
    catNavEl.style.top = hh + 'px';
    const nh = catNavEl.offsetHeight;
    const offset = hh + nh + 10;
    document.querySelectorAll('.cat-section').forEach(el => {
      el.style.scrollMarginTop = offset + 'px';
    });
  }

  new ResizeObserver(updateLayout).observe(headerEl);
  window.addEventListener('resize', updateLayout, { passive:true });

  /* ══════════════════════════════════════════════════════
     NAVIGATION
  ══════════════════════════════════════════════════════ */
  function jumpTo(id) {
    document.getElementById('cat-' + id)
      ?.scrollIntoView({ behavior:'smooth', block:'start' });
    setActiveTab(id);
  }

  function setActiveTab(id) {
    document.querySelectorAll('.cat-nav-btn').forEach(b =>
      b.classList.toggle('active', b.dataset.cat === id));
    document.querySelector(`.cat-nav-btn[data-cat="${id}"]`)
      ?.scrollIntoView({ behavior:'smooth', block:'nearest', inline:'center' });
  }

  let scrollDebounce;
  function observeSections() {
    if (sectionObserver) sectionObserver.disconnect();
    sectionObserver = new IntersectionObserver(entries => {
      entries.forEach(e => {
        if (e.isIntersecting) {
          clearTimeout(scrollDebounce);
          scrollDebounce = setTimeout(() =>
            setActiveTab(e.target.id.replace('cat-', '')), 60);
        }
      });
    }, { rootMargin: `-${headerEl.offsetHeight + catNavEl.offsetHeight + 10}px 0px -50% 0px` });
    document.querySelectorAll('.cat-section').forEach(el => sectionObserver.observe(el));
  }

  /* ══════════════════════════════════════════════════════
     LANGUAGE SWITCHER
  ══════════════════════════════════════════════════════ */
  document.getElementById('langSwitcher').addEventListener('click', e => {
    const btn = e.target.closest('.lang-btn');
    if (!btn) return;
    const lang = btn.dataset.lang;
    if (!MENU[lang]) {
      showToast(MENU[currentLang]?.unavailableMsg || '준비중');
      return;
    }
    document.querySelectorAll('.lang-btn').forEach(b =>
      b.classList.toggle('active', b.dataset.lang === lang));
    renderMenu(lang);
  });

  /* ══════════════════════════════════════════════════════
     TOAST
  ══════════════════════════════════════════════════════ */
  let toastTimer;
  function showToast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.classList.remove('show'), 2200);
  }

  /* ── INIT ── */
  renderMenu('ko');
  </script>
</body>
</html>
