<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#2b1d14">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>커피나무 키우기 — PNS 팔롬비니</title>
  <meta name="description" content="PNS 팔롬비니 커피나무를 키워보세요. 탭하고, 물주고, 성장을 지켜보세요.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- 가로 회전 안내 -->
  <div class="rotate-notice" id="rotateNotice">
    <div class="rotate-notice-inner">
      <div class="rotate-icon">📱</div>
      <p>세로 화면으로 돌려주세요</p>
    </div>
  </div>

  <!-- 게임 컨테이너 -->
  <div class="game-container" id="gameContainer">

    <!-- 상단 HUD -->
    <div class="hud">
      <div class="hud-left">
        <div class="hud-row"><span class="hud-icon">☕</span><span class="hud-bean-count" id="hudBeans">0</span></div>
        <div class="hud-row golden"><span class="hud-icon">✨</span><span class="hud-bean-count" id="hudGoldenBeans">0</span></div>
      </div>
      <div class="hud-center">
        <div class="water-bar-wrap">
          <div class="water-bar-fill" id="waterBarFill"></div>
          <span class="water-bar-text" id="waterBarText">70</span>
        </div>
        <span class="water-label">💧 물</span>
      </div>
      <div class="hud-right">
        <!-- 로그인 상태: 프로필 사진 or 로그인 버튼 -->
        <button class="hud-avatar-btn" id="hudAvatarBtn" aria-label="계정">
          <img class="hud-avatar-img" id="hudAvatarImg" src="" alt="" style="display:none;">
          <span class="hud-avatar-placeholder" id="hudAvatarPlaceholder">👤</span>
        </button>
        <button class="hud-btn" id="btnSettings" aria-label="설정">⚙️</button>
      </div>
    </div>

    <!-- 성장 단계 표시 -->
    <div class="stage-bar">
      <span id="stageName">🌱 새싹</span>
      <span class="stage-xp" id="stageXp">0 / 15 XP</span>
    </div>

    <!-- Phaser Canvas 영역 -->
    <div class="canvas-area" id="gameCanvasArea">
      <!-- 수확 버튼 (Stage 5에서만 표시) -->
      <button class="harvest-btn" id="btnHarvest">🍒 수확하기</button>
      <!-- 튜토리얼 힌트 -->
      <div class="tutorial-hint" id="tutorialHint"></div>
      <!-- 클라우드 저장 상태 표시 -->
      <div class="cloud-status" id="cloudStatus"></div>
    </div>

    <!-- 하단 액션 바 -->
    <div class="action-bar">
      <button class="action-btn" id="btnWater">
        <span class="action-btn-icon">💧</span>
        <span class="action-btn-label">물주기</span>
        <span class="action-btn-cooldown" id="waterCooldown"></span>
      </button>
      <button class="action-btn" id="btnInventory" disabled>
        <span class="action-btn-icon">🎒</span>
        <span class="action-btn-label">가방</span>
      </button>
      <button class="action-btn" id="btnCollection">
        <span class="action-btn-icon">📖</span>
        <span class="action-btn-label">컬렉션</span>
      </button>
    </div>

  </div>

  <!-- 오프라인 복귀 팝업 -->
  <div class="overlay" id="offlinePopup">
    <div class="popup">
      <h3>다시 오셨군요!</h3>
      <div class="popup-body" id="offlinePopupBody"></div>
      <button class="popup-btn" id="offlinePopupClose">확인</button>
    </div>
  </div>

  <!-- 컬렉션 패널 -->
  <div class="overlay" id="collectionPanel">
    <div class="popup popup-tall">
      <h3>📖 컬렉션</h3>
      <div class="popup-body popup-body-scroll" id="collectionBody"></div>
      <button class="popup-btn" id="collectionClose">닫기</button>
    </div>
  </div>

  <!-- 수확 팝업 -->
  <div class="overlay" id="harvestPopup">
    <div class="popup">
      <h3>🍒 수확 완료!</h3>
      <div class="popup-body" id="harvestPopupBody"></div>
      <button class="popup-btn" id="harvestPopupClose">확인</button>
    </div>
  </div>

  <!-- 보상 코드 입력 패널 -->
  <div class="overlay" id="rewardPanel">
    <div class="popup">
      <h3>🎁 보상 코드</h3>
      <div class="popup-body">
        <p style="margin-bottom:12px;">제품에 포함된 보상 코드를 입력하세요.</p>
        <input type="text" class="reward-input" id="rewardCodeInput" placeholder="코드 입력..." maxlength="20" autocomplete="off">
        <div class="reward-inline-result" id="rewardInlineResult"></div>
      </div>
      <div class="popup-btn-row">
        <button class="popup-btn" id="rewardSubmitBtn">확인</button>
        <button class="popup-btn popup-btn-secondary" id="rewardPanelClose">닫기</button>
      </div>
    </div>
  </div>

  <!-- 보상 결과 팝업 -->
  <div class="overlay" id="rewardResultPopup">
    <div class="popup">
      <h3>🎁 보상</h3>
      <div class="popup-body" id="rewardResultBody"></div>
      <button class="popup-btn" id="rewardResultClose">확인</button>
    </div>
  </div>

  <!-- 계정 패널 (로그인/프로필) -->
  <div class="overlay" id="accountPanel">
    <div class="popup">
      <h3>☁️ 계정</h3>
      <div class="popup-body" id="accountPanelBody">
        <!-- JS로 채워짐 -->
      </div>
      <button class="popup-btn popup-btn-secondary" id="accountPanelClose" style="margin-top:12px;">닫기</button>
    </div>
  </div>

  <!-- 설정 패널 -->
  <div class="overlay" id="settingsPanel">
    <div class="popup">
      <h3>설정</h3>
      <div class="popup-body" style="display:flex;flex-direction:column;gap:10px;">
        <button class="popup-btn" id="btnRewardCode">🎁 보상 코드 입력</button>
        <button class="popup-btn popup-btn-danger" id="btnResetData">데이터 초기화</button>
      </div>
      <button class="popup-btn popup-btn-secondary" id="settingsClose" style="margin-top:12px;">닫기</button>
    </div>
  </div>

  <!-- Firebase SDKs (v10 compat) -->
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
  <script src="game.js"></script>
</body>
</html>
