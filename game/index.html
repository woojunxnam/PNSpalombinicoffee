<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#2b1d14">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>커피나무 키우기 — PNS 팔롬비니</title>
  <meta name="description" content="PNS 팔롬비니 커피나무를 키워보세요. 탭하고, 물주고, 성장을 지켜보세요.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.svg">
  <link rel="icon" type="image/svg+xml" href="icon-192.svg">
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://www.pnscoffee.com/game/" />
  <meta property="og:title" content="커피나무 키우기 — PNS 팔롬비니" />
  <meta property="og:description" content="PNS 팔롬비니 커피나무를 키워보세요. 탭하고, 물주고, 성장을 지켜보세요." />
  <meta property="og:image" content="https://www.pnscoffee.com/assets/img/pns-logo-upscaled.png" />
</head>
<body>

  <!-- 로딩 화면 -->
  <div class="loading-screen" id="loadingScreen">
    <div class="loading-inner">
      <div class="loading-logo">🌱</div>
      <h1 class="loading-title">커피나무 키우기</h1>
      <p class="loading-subtitle">PNS 팔롬비니</p>
      <div class="loading-bar"><div class="loading-bar-fill" id="loadingBarFill"></div></div>
      <p class="loading-tip" id="loadingTip">탭하면 원두가 자라요</p>
    </div>
  </div>

  <!-- 가로 회전 안내 -->
  <div class="rotate-notice" id="rotateNotice">
    <div class="rotate-notice-inner">
      <div class="rotate-icon">📱</div>
      <p>세로 화면으로 돌려주세요</p>
    </div>
  </div>

  <!-- 게임 컨테이너 -->
  <div class="game-container" id="gameContainer">

    <!-- 상단 HUD -->
    <div class="hud">
      <div class="hud-left">
        <div class="hud-row"><span class="hud-icon">☕</span><span class="hud-bean-count" id="hudBeans">0</span></div>
        <div class="hud-row golden"><span class="hud-icon">✨</span><span class="hud-bean-count" id="hudGoldenBeans">0</span></div>
      </div>
      <div class="hud-center">
        <div class="water-bar-wrap">
          <div class="water-bar-fill" id="waterBarFill"></div>
          <span class="water-bar-text" id="waterBarText">70</span>
        </div>
        <span class="water-label">💧 물</span>
      </div>
      <div class="hud-right">
        <!-- 로그인 상태: 프로필 사진 or 로그인 버튼 -->
        <button class="hud-avatar-btn" id="hudAvatarBtn" aria-label="계정">
          <img class="hud-avatar-img" id="hudAvatarImg" src="" alt="" style="display:none;">
          <span class="hud-avatar-placeholder" id="hudAvatarPlaceholder">👤</span>
        </button>
        <button class="hud-btn" id="btnSettings" aria-label="설정">⚙️</button>
      </div>
    </div>

    <!-- 성장 단계 표시 -->
    <div class="stage-bar">
      <button class="stage-info-btn" id="btnStageInfo" aria-label="단계 정보">ⓘ</button>
      <span id="stageName">🌱 새싹</span>
      <span class="stage-xp" id="stageXp">0 / 15 XP</span>
    </div>

    <!-- Phaser Canvas 영역 -->
    <div class="canvas-area" id="gameCanvasArea">
      <!-- 수확 버튼 (Stage 5에서만 표시) -->
      <button class="harvest-btn" id="btnHarvest">🍒 수확하기</button>
      <!-- 튜토리얼 힌트 -->
      <div class="tutorial-hint" id="tutorialHint"></div>
      <!-- 클라우드 저장 상태 표시 -->
      <div class="cloud-status" id="cloudStatus"></div>
    </div>

    <!-- 하단 액션 바 -->
    <div class="action-bar">
      <button class="action-btn" id="btnWater">
        <span class="action-btn-icon">💧</span>
        <span class="action-btn-label">물주기</span>
        <span class="action-btn-cooldown" id="waterCooldown"></span>
      </button>
      <button class="action-btn" id="btnInventory">
        <span class="action-btn-icon">🎒</span>
        <span class="action-btn-label">가방</span>
      </button>
      <button class="action-btn" id="btnCollection">
        <span class="action-btn-icon">📖</span>
        <span class="action-btn-label">컬렉션</span>
      </button>
    </div>

  </div>

  <!-- 오프라인 복귀 팝업 -->
  <div class="overlay" id="offlinePopup">
    <div class="popup">
      <h3>다시 오셨군요!</h3>
      <div class="popup-body" id="offlinePopupBody"></div>
      <button class="popup-btn" id="offlinePopupClose">확인</button>
    </div>
  </div>

  <!-- 컬렉션 패널 -->
  <div class="overlay" id="collectionPanel">
    <div class="popup popup-tall">
      <h3>📖 컬렉션</h3>
      <div class="popup-body popup-body-scroll" id="collectionBody"></div>
      <button class="popup-btn" id="collectionClose">닫기</button>
    </div>
  </div>

  <!-- 수확 팝업 -->
  <div class="overlay" id="harvestPopup">
    <div class="popup">
      <h3>🍒 수확 완료!</h3>
      <div class="popup-body" id="harvestPopupBody"></div>
      <button class="popup-btn" id="harvestPopupClose">확인</button>
    </div>
  </div>

  <!-- 보상 코드 입력 패널 -->
  <div class="overlay" id="rewardPanel">
    <div class="popup">
      <h3>🎁 보상 코드</h3>
      <div class="popup-body">
        <p style="margin-bottom:12px;">제품에 포함된 보상 코드를 입력하세요.</p>
        <input type="text" class="reward-input" id="rewardCodeInput" placeholder="코드 입력..." maxlength="20" autocomplete="off">
        <div class="reward-inline-result" id="rewardInlineResult"></div>
      </div>
      <div class="popup-btn-row">
        <button class="popup-btn" id="rewardSubmitBtn">확인</button>
        <button class="popup-btn popup-btn-secondary" id="rewardPanelClose">닫기</button>
      </div>
    </div>
  </div>

  <!-- 보상 결과 팝업 -->
  <div class="overlay" id="rewardResultPopup">
    <div class="popup">
      <h3>🎁 보상</h3>
      <div class="popup-body" id="rewardResultBody"></div>
      <button class="popup-btn" id="rewardResultClose">확인</button>
    </div>
  </div>

  <!-- 계정 패널 (로그인/프로필) -->
  <div class="overlay" id="accountPanel">
    <div class="popup">
      <h3>☁️ 계정</h3>
      <div class="popup-body" id="accountPanelBody">
        <!-- JS로 채워짐 -->
      </div>
      <button class="popup-btn popup-btn-secondary" id="accountPanelClose" style="margin-top:12px;">닫기</button>
    </div>
  </div>

  <!-- 설정 패널 -->
  <div class="overlay" id="settingsPanel">
    <div class="popup">
      <h3>설정</h3>
      <div class="popup-body" style="display:flex;flex-direction:column;gap:10px;">
        <button class="popup-btn" id="btnSoundToggle">🔊 사운드 켜짐</button>
        <button class="popup-btn" id="btnStats">📊 통계 보기</button>
        <button class="popup-btn" id="btnRecords">📔 수확 기록장</button>
        <button class="popup-btn" id="btnLetters">📭 편지함</button>
        <button class="popup-btn" id="btnShare">📤 친구에게 자랑하기</button>
        <button class="popup-btn" id="btnNotifyToggle">🔔 출석 알림</button>
        <button class="popup-btn" id="btnRewardCode">🎁 보상 코드 입력</button>
        <button class="popup-btn popup-btn-danger" id="btnResetData">데이터 초기화</button>
      </div>
      <button class="popup-btn popup-btn-secondary" id="settingsClose" style="margin-top:12px;">닫기</button>
    </div>
  </div>

  <!-- 인벤토리(가방) 패널 -->
  <div class="overlay" id="inventoryPanel">
    <div class="popup popup-tall">
      <h3>🎒 가방</h3>
      <div class="popup-body popup-body-scroll" id="inventoryBody"></div>
      <button class="popup-btn popup-btn-secondary" id="inventoryClose" style="margin-top:12px;">닫기</button>
    </div>
  </div>

  <!-- 단계 정보 팝업 -->
  <div class="overlay" id="stageInfoPanel">
    <div class="popup">
      <h3 id="stageInfoTitle">🌱 새싹</h3>
      <div class="popup-body" id="stageInfoBody"></div>
      <button class="popup-btn popup-btn-secondary" id="stageInfoClose" style="margin-top:12px;">닫기</button>
    </div>
  </div>

  <!-- 재방문(연속 끊김) 알림 팝업 -->
  <div class="overlay" id="revisitPopup">
    <div class="popup">
      <h3>😢 아쉬워요!</h3>
      <div class="popup-body" id="revisitBody"></div>
      <button class="popup-btn" id="revisitClose">다시 시작하기</button>
    </div>
  </div>

  <!-- 통계 패널 -->
  <div class="overlay" id="statsPanel">
    <div class="popup">
      <h3>📊 통계</h3>
      <div class="popup-body" id="statsBody"></div>
      <button class="popup-btn popup-btn-secondary" id="statsClose" style="margin-top:12px;">닫기</button>
    </div>
  </div>

  <!-- 기록장 패널 (Phase F-3) -->
  <div class="overlay" id="recordPanel">
    <div class="popup popup-tall">
      <h3>📔 수확 기록장</h3>
      <div class="popup-body popup-body-scroll" id="recordBody"></div>
      <button class="popup-btn popup-btn-secondary" id="recordClose" style="margin-top:12px;">닫기</button>
    </div>
  </div>

  <!-- 편지함 패널 (Phase G-1) -->
  <div class="overlay" id="letterPanel">
    <div class="popup popup-tall">
      <h3>📬 편지함</h3>
      <div class="popup-body popup-body-scroll" id="letterBody"></div>
      <button class="popup-btn popup-btn-secondary" id="letterClose" style="margin-top:12px;">닫기</button>
    </div>
  </div>

  <!-- 편지 상세 팝업 (Phase G-1) -->
  <div class="overlay" id="letterDetailPopup">
    <div class="popup popup-tall">
      <div class="popup-body popup-body-scroll" id="letterDetailBody"></div>
      <button class="popup-btn popup-btn-secondary" id="letterDetailClose" style="margin-top:12px;">닫기</button>
    </div>
  </div>

  <!-- 일일 보너스 팝업 -->
  <div class="overlay" id="dailyBonusPopup">
    <div class="popup">
      <h3>🎁 일일 출석 보너스</h3>
      <div class="popup-body" id="dailyBonusBody"></div>
      <button class="popup-btn" id="dailyBonusClose">받기</button>
    </div>
  </div>

  <!-- 공용 알림 팝업 (showNotice) — 튜토리얼/단계 전환/이벤트 -->
  <div class="overlay" id="noticePopup">
    <div class="popup popup-notice">
      <div class="notice-icon" id="noticeIcon">🌱</div>
      <h3 class="notice-title" id="noticeTitle">알림</h3>
      <div class="popup-body notice-body" id="noticeBody"></div>
      <button class="popup-btn" id="noticeCta">확인</button>
    </div>
  </div>

  <!-- Firebase SDKs (v10 compat) -->
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
  <script src="game.js"></script>
</body>
</html>
